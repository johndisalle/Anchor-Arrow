<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor &amp; Arrow — Legal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F8F4EF;
            color: #1C1917;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .card {
            text-align: center;
            max-width: 400px;
        }
        h1 {
            font-size: 28px;

            margin-bottom: 32px;
        }
        .links { display: flex; flex-direction: column; gap: 12px; }
        a {
            display: block;
